<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <style>
    html {
      font-family: "monospace", monospace;
    }
  </style>
  <label for="number">Number:</label>
  <input type="text" id="number" value="0">
  <p id="numInput">await</p>
  <script>
    function ah() {
      document.getElementById("number").value = document.getElementById("number").value.replace(/\D/g, "")
      document.getElementById("numInput").innerHTML = document.getElementById("number").value
    }
    setInterval(ah, 1)
  </script>
</body>
</html>
